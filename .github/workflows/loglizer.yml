name: Loglizer Anomaly Detection

on:
  push:
    branches: [main, master, feat/loglizer]
  pull_request:
    branches: [main, master, feat/loglizer]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  anomaly-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Generate sample logs
        run: |
          python ml/generate_logs.py
          echo "Generated log files:"
          ls -la logs/

      - name: Train anomaly detection model
        run: python ml/train.py

      - name: Detect anomalies
        run: python ml/detect.py

      - name: Generate reports
        run: python ml/report.py

      - name: Upload anomaly reports
        uses: actions/upload-artifact@v4
        with:
          name: anomaly-reports
          path: |
            reports/report.md
            reports/anomalies.json
            reports/summary.json
            reports/index.html
          retention-days: 30

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: ml/model.pkl
          retention-days: 30

      - name: Display anomaly summary
        run: |
          echo "## Anomaly Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/summary.json ]; then
            cat reports/summary.json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          s = data['summary']
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Total Sessions | {s[\"total_sessions\"]} |')
          print(f'| Normal Sessions | {s[\"normal_count\"]} |')
          print(f'| Anomalous Sessions | {s[\"anomaly_count\"]} |')
          rate = round(s['anomaly_count'] / s['total_sessions'] * 100, 1) if s['total_sessions'] > 0 else 0
          print(f'| Anomaly Rate | {rate}% |')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Pages artifact
        # Only deploy to Pages on push to main/master (not PRs)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/loglizer')
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy-pages:
    needs: anomaly-detection
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/loglizer')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
